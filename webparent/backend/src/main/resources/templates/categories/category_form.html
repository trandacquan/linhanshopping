<!--
    Form tạo mới / chỉnh sửa Category (dùng chung 1 template cho cả 2 trường hợp).
    - Tạo mới: CategoryController.newCategory() đổ vào 1 Category rỗng, enabled=true.
    - Sửa: CategoryController.editCategory() đổ Category lấy từ DB theo id.
    Submit về POST /categories/save (CategoryController.saveCategory()).
    Input file phải tên "fileImage" để khớp @RequestParam("fileImage") ở Controller.
    -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments :: page_head(${pageTitle},tag)"></head>

<body>
    <div class="container-fluid">
        <div class="row">
            <div th:replace="navigation :: side-menu('tag')"></div>

            <div class="col-sm-10">
                <div class="title-container">
                    <h2 class="page-title p-3 border-bottom">[[${pageTitle}]]</h2>
                </div>

                <form th:action="@{/categories/save}" method="post" style="max-width: 800px; margin: 0 auto"
                    th:object="${category}" enctype="multipart/form-data">

                    <input type="hidden" th:field="*{id}">

                    <div class="border border rounded p-4 mt-3">
                        <div class="form-group row">
                            <label class="col-sm-4 col-form-label border-bottom">Category Name </label>
                            <div class="col-sm-8">
                                <input type="text" class="form-control" th:field="*{name}" required minlength="3"
                                    maxlength="128" />
                            </div>
                        </div>

                        <div class="form-group row">
                            <label class="col-sm-4 col-form-label border-bottom">Alias </label>
                            <div class="col-sm-8">
                                <input type="text" class="form-control" th:field="*{alias}" required minlength="3"
                                    maxlength="64" />
                            </div>
                        </div>

                        <div class="form-group row">
                            <label class="col-sm-4 col-form-label">Enabled </label>
                            <div class="col-sm-8">
                                <input type="checkbox" th:field="*{enabled}">
                            </div>
                        </div>

                        <div class="form-group row">
                            <label class="col-sm-4 col-form-label">Image </label>
                            <div class="col-sm-8">
                                <!-- hidden input giữ tên ảnh cũ -->
                                <!-- nếu user không chọn ảnh mới thì Controller sẽ dùng lại giá trị này thay vì xóa ảnh -->
                                <input type="hidden" th:field="*{image}" />
                                <input type="file" id="fileImage" name="fileImage" accept="image/png, image/jpeg"
                                    class="mb-2" />
                                <img id="thumbnail" alt="Category image preview" th:src="@{${category.imagePath}}"
                                    class="img-fluid rounded shadow" />
                            </div>
                        </div>

                        <div class="text-center">
                            <input type="submit" value="Save" class="btn btn-primary m-3" />
                            <input type="button" value="Cancel" class="btn btn-secondary" id="buttonCancel" />
                        </div>
                    </div>
                </form>
                <div th:replace="fragments :: footer"></div>
            </div>
        </div>

        <div th:replace="modal_fragments :: modal_dialog"></div>

    </div>

    <script th:src="@{/js/navigation.js}"></script>
    <script th:src="@{/js/common_form.js}"></script>
    <script type="text/javascript">
        MAX_FILE_SIZE = 102400;

        moduleURL = "[[@{/categories}]]";
    </script>

</body>

</html>
